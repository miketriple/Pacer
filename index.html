<!DOCTYPE html>
<html lang="en" data-theme="venom" data-mode="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pacer">
  <meta name="description" content="Guided rhythm for any workflow. Build a pace, follow the steps.">
  <title>Pacer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <header class="app-header">
      <div class="logo">PACER</div>
      <button class="icon-btn" id="btn-settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div class="screen-content">
      <div id="sync-status" class="sync-status"></div>
      <div id="pace-list"></div>
    </div>
    <div class="screen-footer">
      <button class="btn btn-accent" id="btn-new-pace">+ New Pace</button>
    </div>
  </div>

  <!-- TEMPLATE PICKER -->
  <div id="screen-templates" class="screen">
    <header class="app-header">
      <button class="icon-btn" id="btn-templates-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="header-title">New Pace</div>
      <div style="width:40px"></div>
    </header>
    <div class="screen-content">
      <p class="screen-hint">Start blank or pick a template. Everything is editable after.</p>
      <button class="template-blank-btn" id="btn-blank-pace">
        <span class="template-blank-icon">+</span>
        <span class="template-blank-text">
          <span class="template-blank-title">Start Blank</span>
          <span class="template-blank-sub">Build your pace from scratch</span>
        </span>
      </button>
      <div id="template-list"></div>
    </div>
  </div>

  <!-- BUILDER -->
  <div id="screen-builder" class="screen">
    <header class="app-header">
      <button class="icon-btn" id="btn-builder-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <input type="text" class="header-name-input" id="builder-pace-name" placeholder="Name this pace…" maxlength="60">
      <button class="icon-btn danger-btn" id="btn-delete-pace" aria-label="Delete" style="visibility:hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-duplicate-pace" aria-label="Duplicate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-save-pace" aria-label="Save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>
    </header>
    <div class="pace-settings-bar">
      <span class="pace-setting-label">Transition Countdown</span>
      <div class="countdown-opts" id="countdown-opts">
        <button class="countdown-opt" data-value="silent">Silent</button>
        <button class="countdown-opt" data-value="3">3 sec</button>
        <button class="countdown-opt" data-value="5">5 sec</button>
      </div>
    </div>
    <div class="screen-content" id="builder-content"></div>
    <div class="screen-footer builder-footer">
      <button class="btn btn-secondary btn-sm" id="btn-add-step-footer">+ Step</button>
      <button class="btn btn-secondary btn-sm" id="btn-add-group-footer">+ Group</button>
      <button class="btn btn-accent" id="btn-start-pace">▶ Start</button>
    </div>
  </div>

  <!-- TIMER -->
  <div id="screen-timer" class="screen">
    <header class="app-header timer-header">
      <div class="timer-pace-name" id="timer-pace-name"></div>
      <button class="icon-btn timer-end-btn" id="btn-end-pace" aria-label="End pace" title="End pace">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </header>
    <div class="timer-body">
      <div class="timer-phase-label" id="timer-phase-label"></div>
      <div class="timer-step-name" id="timer-step-name"></div>
      <div class="timer-ring-wrap">
        <svg class="decor-ring-svg decor-1" viewBox="0 0 210 210" aria-hidden="true"><circle cx="105" cy="105" r="99"></circle></svg>
        <svg class="decor-ring-svg decor-2" viewBox="0 0 210 210" aria-hidden="true"><circle cx="105" cy="105" r="103"></circle></svg>
        <svg class="timer-ring" viewBox="0 0 210 210" aria-hidden="true">
          <circle class="timer-ring-track" cx="105" cy="105" r="92"></circle>
          <circle class="timer-ring-fill" id="timer-ring-fill" cx="105" cy="105" r="92"></circle>
        </svg>
        <div class="timer-clock-overlay">
          <div class="timer-clock" id="timer-clock">00:00</div>
          <div class="timer-clock-sub" id="timer-clock-sub"></div>
        </div>
      </div>
      <div class="timer-cue-text" id="timer-cue-text"></div>
      <div class="timer-overall-progress" id="timer-overall-progress"></div>
      <div class="timer-next" id="timer-next"></div>
      <button class="btn-manual-next" id="btn-manual-next" style="display:none">Done — Next Step</button>
    </div>
    <div class="timer-controls">
      <button class="btn btn-secondary btn-icon" id="btn-prev-step" aria-label="Previous step" title="Previous step"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="btn btn-secondary btn-icon" id="btn-restart-step" aria-label="Restart step" title="Restart step"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
      <button class="btn btn-secondary btn-icon" id="btn-pause-resume" aria-label="Pause" title="Pause"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1.5"/><rect x="14" y="4" width="4" height="16" rx="1.5"/></svg></button>
      <button class="btn btn-secondary btn-icon" id="btn-next-step" aria-label="Next step" title="Next step"><svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
  </div>

  <!-- COMPLETE -->
  <div id="screen-complete" class="screen">
    <div class="complete-body">
      <div class="complete-check">✓</div>
      <div class="complete-title">Pace Complete!</div>
      <div class="complete-name" id="complete-name"></div>
      <div class="complete-time" id="complete-time"></div>
      <div class="complete-actions">
        <button class="btn btn-secondary" id="btn-do-again">Go Again</button>
        <button class="btn btn-accent" id="btn-complete-home">Done</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <header class="app-header">
      <button class="icon-btn" id="btn-settings-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="header-title">Settings</div>
      <div style="width:40px"></div>
    </header>
    <div class="screen-content">
      <section class="settings-section">
        <h3 class="settings-heading">Appearance</h3>
        <div class="settings-row">
          <span class="settings-label">Mode</span>
          <div class="segmented-control" id="mode-toggle">
            <button class="seg-btn" data-mode="light">Light</button>
            <button class="seg-btn" data-mode="system">System</button>
            <button class="seg-btn" data-mode="dark">Dark</button>
          </div>
        </div>
        <div class="settings-row settings-row-col">
          <span class="settings-label">Theme</span>
          <div class="theme-grid" id="theme-grid">
            <button class="theme-swatch active" data-theme="venom"><span class="swatch-dot" style="background:#39ff14"></span>Venom</button>
            <button class="theme-swatch" data-theme="ember"><span class="swatch-dot" style="background:#ff4500"></span>Ember</button>
            <button class="theme-swatch" data-theme="dusk"><span class="swatch-dot" style="background:#b44fff"></span>Dusk</button>
            <button class="theme-swatch" data-theme="arctic"><span class="swatch-dot" style="background:#00d4ff"></span>Arctic</button>
            <button class="theme-swatch" data-theme="chalk"><span class="swatch-dot" style="background:#d0d0d0"></span>Chalk</button>
            <button class="theme-swatch" data-theme="sage"><span class="swatch-dot" style="background:#8fbf9f"></span>Sage</button>
            <button class="theme-swatch" data-theme="forest"><span class="swatch-dot" style="background:#4ade80"></span>Forest</button>
          </div>
        </div>
      </section>
      <section class="settings-section">
        <h3 class="settings-heading">Voice</h3>
        <div class="form-group">
          <label class="form-label">Announcement voice</label>
          <select class="form-input" id="settings-voice">
            <option value="">Default voice</option>
          </select>
        </div>
        <button class="btn btn-secondary" id="btn-test-voice">Test Voice</button>
      </section>
      <section class="settings-section">
        <h3 class="settings-heading">Sync</h3>
        <p class="settings-note">Connect to your Pacer API to sync paces across devices.</p>
        <div class="form-group">
          <label class="form-label">API URL</label>
          <input type="url" class="form-input" id="settings-api-url" placeholder="https://api.the12414.com">
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="password" class="form-input" id="settings-api-key" placeholder="Your shared API key">
        </div>
        <button class="btn btn-secondary" id="btn-test-api">Test Connection</button>
        <div class="api-status" id="api-status"></div>
      </section>
      <section class="settings-section">
        <h3 class="settings-heading">About</h3>
        <p class="settings-note">Pacer — Guided rhythm for any workflow.<br>pacer.the12414.com</p>
      </section>
    </div>
    <div class="screen-footer">
      <button class="btn btn-accent" id="btn-save-settings">Save Settings</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
